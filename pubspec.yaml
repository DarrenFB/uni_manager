name: uni_manager
description: "UniManager - Your university life, organized."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get: ^4.7.3
  isar_community: 3.3.0
  isar_community_flutter_libs: 3.3.0
  path_provider: ^2.1.5
  iconsax: ^0.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  isar_community_generator: 3.3.0
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

  # Uncomment and update once you have the Inter font in assets/fonts/
